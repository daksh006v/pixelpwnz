version: '3.8'

services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - '8000:8000'
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma_data:/chroma/chroma

  ollama:
    image: ollama/ollama:latest
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

volumes:
  chroma_data:
  ollama_data:
